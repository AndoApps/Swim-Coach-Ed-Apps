<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SwimSet Architect v2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --dark: #101010;
  --card: #161616;
  --card2: #1e1e1e;
  --border: #272727;
  --border2: #333;
  --silver: #777;
  --silver2: #999;
  --white: #efefef;
  --accent: #c8c8c8;
  --gold: #c8a84b;
  --badge-a1: #1a4a1a;
  --badge-a1t: #5dbb5d;
  --badge-en2: #0d3d28;
  --badge-en2t: #3dbb8d;
  --badge-en3: #3d2a0a;
  --badge-en3t: #ddaa4d;
  --badge-sp1: #3d0a0a;
  --badge-sp1t: #dd5d5d;
  --badge-sp2: #2a0a3d;
  --badge-sp2t: #bb5ddd;
  --badge-rec: #1a1a2a;
  --badge-rect: #8888bb;
  --badge-fly: #1a0d2e;
  --badge-flyt: #cc88ff;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo-wrap { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  line-height: 1;
}
.logo-text span { color: var(--silver); }
.logo-v { font-size: 11px; color: var(--silver); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; }

/* NAV */
.nav {
  display: flex;
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }

.nav-btn {
  flex: 1; min-width: 72px;
  padding: 11px 6px;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--silver);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn.active { color: var(--white); border-bottom-color: var(--accent); }

/* SCREENS */
.screen { display: none; padding: 14px 14px 80px; }
.screen.active { display: block; }

/* SHARED COMPONENTS */
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  margin-bottom: 16px;
  color: var(--white);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.card-header {
  background: var(--card2);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
}

.badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  border: 1px solid transparent;
}

.badge-a1 { background: var(--badge-a1); color: var(--badge-a1t); border-color: var(--badge-a1); }
.badge-en2 { background: var(--badge-en2); color: var(--badge-en2t); border-color: var(--badge-en2); }
.badge-en3 { background: var(--badge-en3); color: var(--badge-en3t); border-color: var(--badge-en3); }
.badge-sp1 { background: var(--badge-sp1); color: var(--badge-sp1t); border-color: var(--badge-sp1); }
.badge-sp2 { background: var(--badge-sp2); color: var(--badge-sp2t); border-color: var(--badge-sp2); }
.badge-rec { background: var(--badge-rec); color: var(--badge-rect); border-color: var(--badge-rec); }
.badge-fly { background: var(--badge-fly); color: var(--badge-flyt); border-color: var(--badge-fly); }

.btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--silver2);
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--silver); color: var(--white); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--black);
  font-weight: 700;
}
.btn-primary:hover { opacity: 0.85; color: var(--black); }

.btn-full {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  letter-spacing: 3px;
  border-radius: 8px;
  margin-top: 10px;
}

.row {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* WEEK SCREEN */
.week-nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.week-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
}

.week-arrows { display: flex; gap: 6px; }
.week-arrows button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--silver2);
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

.day-card { margin-bottom: 10px; }

.day-title-row {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px 10px 0 0;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: none;
}

.day-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
}

.day-vol {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  color: var(--silver);
  letter-spacing: 1px;
}

.session-slot {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px;
}
.session-slot:last-child { border-radius: 0 0 10px 10px; }
.session-slot:hover { background: var(--card2); }

.slot-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px;
  color: var(--silver);
  width: 28px;
  flex-shrink: 0;
}

.slot-info { flex: 1; min-width: 0; }

.slot-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.slot-sets {
  font-size: 11px;
  color: var(--silver);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.slot-arrow { color: var(--silver); font-size: 18px; flex-shrink: 0; }

.rest-slot {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 12px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
}

/* SESSION BUILDER SCREEN */
.back-btn {
  background: none; border: none;
  color: var(--silver2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}

.session-meta-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.session-day-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 4px;
}

.session-main-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 10px;
}

.stats-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.stat { display: flex; flex-direction: column; }
.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 1px;
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.ai-btn {
  width: 100%;
  background: linear-gradient(135deg, #1a1a1a, #222);
  border: 1px solid #444;
  color: var(--white);
  border-radius: 8px;
  padding: 13px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 3px;
  cursor: pointer;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.ai-btn:hover { border-color: var(--accent); }
.ai-btn .ai-icon { font-size: 18px; }

/* SESSION BLOCKS */
.blocks-container { margin-bottom: 14px; }

.block-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}

.block-header {
  background: var(--card2);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.block-type {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
}

.block-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--white);
  flex: 1;
}

.block-actions { display: flex; gap: 6px; }

.block-action-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--silver);
  width: 28px; height: 28px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.block-action-btn:hover { border-color: var(--silver2); color: var(--white); }
.block-action-btn.delete:hover { border-color: #dd5d5d; color: #dd5d5d; }

.block-content { padding: 10px 12px; }

.set-line {
  display: flex;
  align-items: flex-start;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.set-line:last-child { border-bottom: none; }

.set-dist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--accent);
  min-width: 44px;
  line-height: 1.2;
}

.set-detail {
  flex: 1;
  font-size: 13px;
  color: var(--white);
  line-height: 1.4;
  padding-top: 2px;
}

.set-interval {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--silver2);
  white-space: nowrap;
}

.block-footer {
  padding: 6px 12px 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--silver);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.scalable-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--badge-en2t);
  display: inline-block;
  margin-right: 4px;
}

/* ADD BLOCK BTN */
.add-block-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border2);
  color: var(--silver);
  border-radius: 8px;
  padding: 13px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 14px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.add-block-btn:hover { border-color: var(--silver); color: var(--white); }

/* NOTES */
.notes-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.notes-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 8px;
}

.notes-input {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  resize: none;
  min-height: 80px;
}
.notes-input:focus { outline: none; border-color: var(--silver); }

/* AI RESPONSE */
.ai-response {
  background: var(--card);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
  display: none;
}
.ai-response.visible { display: block; }
.ai-response-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 8px;
}
.ai-response-text {
  font-size: 14px;
  color: var(--white);
  line-height: 1.6;
}
.ai-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--silver);
  font-size: 13px;
}
.ai-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1s infinite;
}
.ai-dot:nth-child(2) { animation-delay: 0.2s; }
.ai-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* LIBRARY SCREEN */
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  margin-bottom: 14px;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-chip {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--silver);
  padding: 6px 12px;
  border-radius: 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--black);
}

.lib-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--silver);
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.lib-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  color: var(--silver);
}

.lib-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.lib-item:hover { border-color: var(--silver); }

.lib-item-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--white);
  margin-bottom: 5px;
}

.lib-item-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.lib-vol {
  font-size: 11px;
  color: var(--silver);
}

.scalable-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(192,192,192,0.1);
  color: var(--silver2);
  border: 1px solid var(--border);
  text-transform: uppercase;
}

.lib-notes {
  font-size: 11px;
  color: var(--silver);
  margin-top: 5px;
  line-height: 1.4;
}

/* ARCHIVE SCREEN */
.archive-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.archive-item:hover { border-color: var(--silver); }

.archive-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 4px;
}

.archive-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--white);
}

.archive-meta {
  font-size: 12px;
  color: var(--silver);
  margin-top: 3px;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  overflow-y: auto;
  padding: 16px;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }

.modal {
  background: var(--dark);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 18px;
  width: 100%;
  max-width: 480px;
  margin: auto;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.modal-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.modal-item:hover { border-color: var(--accent); }

.modal-item-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--white);
}

.modal-item-meta {
  font-size: 11px;
  color: var(--silver);
  margin-top: 3px;
  display: flex; gap: 8px; align-items: center;
}

.modal-type-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.type-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--silver);
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  flex: 1;
}
.type-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--black);
}

.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* BLOCK DETAIL SCREEN */
.block-detail-type {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 4px;
}

.block-detail-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 2px;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 10px;
}

.block-detail-badges {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.block-detail-line {
  display: flex;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.block-detail-line:last-child { border-bottom: none; }

.block-detail-dist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--accent);
  min-width: 70px;
  line-height: 1.1;
  flex-shrink: 0;
}

.block-detail-desc {
  flex: 1;
  font-size: 18px;
  color: var(--white);
  line-height: 1.4;
  padding-top: 4px;
  font-weight: 500;
}

.block-detail-interval {

function buildDetailLinesHTML(block) {
  if (!block.set || block.set.length === 0) {
    return `<div style="font-size:16px;line-height:1.6;color:var(--white);">${block.notes || 'No details available.'}</div>`;
  }
  let linesHTML = '';
  let i = 0;
  const lines = block.set;
  while (i < lines.length) {
    const line = lines[i];
    const bracketMatch = line.trim().match(/^(\d+)x?\s*\[$/i) || line.trim().match(/^(\d+)\s+ROUNDS?\s*\[$/i);
    if (bracketMatch) {
      const count = bracketMatch[1];
      linesHTML += `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);padding:10px 0 6px;">${count} ROUNDS</div>`;
      i++;
      while (i < lines.length && lines[i].trim() !== ']') {
        const inner = lines[i];
        if (inner.startsWith('---')) {
          linesHTML += `<div style="height:1px;background:var(--border2);margin:8px 0;"></div>`;
        } else if (inner.startsWith('##')) {
          linesHTML += `<div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--silver);padding:8px 0 4px;text-transform:uppercase;">${inner.replace('##','').trim()}</div>`;
        } else {
          const m = inner.trim().match(/^(\d+x\d+m?|\d+m?)\s+(.*)/);
          if (m) {
            linesHTML += `<div class="block-detail-line" style="padding-left:12px;border-left:2px solid var(--border2);"><div class="block-detail-dist">${m[1].toUpperCase()}</div><div class="block-detail-desc">${m[2]}</div></div>`;
          } else {
            linesHTML += `<div class="block-detail-line" style="padding-left:12px;border-left:2px solid var(--border2);"><div class="block-detail-desc" style="padding-top:0;font-size:15px;color:var(--silver2);">${inner.trim()}</div></div>`;
          }
        }
        i++;
      }
      i++;
      continue;
    }
    if (line.startsWith('---')) {
      linesHTML += `<div style="height:1px;background:var(--border2);margin:8px 0;"></div>`;
    } else if (line.startsWith('##')) {
      linesHTML += `<div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--silver);padding:8px 0 4px;text-transform:uppercase;">${line.replace('##','').trim()}</div>`;
    } else {
      const match = line.trim().match(/^(\d+x\d+m?|\d+m?)\s+(.*)/);
      if (match) {
        linesHTML += `<div class="block-detail-line"><div class="block-detail-dist">${match[1].toUpperCase()}</div><div class="block-detail-desc">${match[2]}</div></div>`;
      } else {
        linesHTML += `<div class="block-detail-line"><div class="block-detail-desc" style="padding-top:0;font-size:16px;color:var(--silver2);">${line.trim()}</div></div>`;
      }
    }
    i++;
  }
  return linesHTML;
}

// Week 1 starts 5 Jan 2026 — matches your periodisation plan
const PLAN_START = new Date(2026, 0, 5); // Jan 5 2026

function getWeekBeginning(weekNum) {
  const d = new Date(PLAN_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }).toUpperCase();
}

function changeWeek(dir) {
  currentWeek = Math.max(1, currentWeek + dir);
  renderWeek();
}

function renderWeek() {
  const plan = WEEK_PLAN[currentWeek] || WEEK_PLAN[1];
  const weekBeginning = getWeekBeginning(currentWeek);
  document.getElementById('weekLabel').textContent = `WEEK ${currentWeek}`;
  document.getElementById('weekBeginning').textContent = `W/B ${weekBeginning}${plan.meso ? ' · ' + plan.meso.toUpperCase() : ''}${plan.meet ? ' 🏆 ' + plan.meet : ''}`;
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  plan.days.forEach(day => {
    const dc = document.createElement('div');
    dc.className = 'day-card';

    let html = `<div class="day-title-row">
      <div class="day-name">${day.name}</div>
      <div class="day-vol">${day.vol}</div>
    </div>`;

    day.sessions.forEach((s, i) => {
      const isLast = i === day.sessions.length - 1;
      if (!s.key) {
        html += `<div class="rest-slot" style="${isLast?'border-radius:0 0 10px 10px':''}">
          ${s.time} — ${s.title}
        </div>`;
      } else {
        const badgeClass = getBadgeClass(s.energy);
        html += `<div class="session-slot" style="${isLast?'border-radius:0 0 10px 10px':''}" onclick="loadSession('${s.key}','${s.time}','${day.name}','${s.title}','${s.energy}')">
          <div class="slot-time">${s.time}</div>
          <div class="slot-info">
            <div class="slot-title">${s.title}</div>
            <div class="slot-sets">${s.sets}</div>
          </div>
          ${s.energy ? `<span class="badge ${badgeClass}">${s.energy}</span>` : ''}
          <div class="slot-arrow">›</div>
        </div>`;
      }
    });

    dc.innerHTML = html;
    grid.appendChild(dc);
  });
}

function loadSession(key, time, day, title, energy) {
  // Load from storage if exists — always use saved version
  const saved = loadFromStorage(key);
  if (saved) {
    currentSession = saved;
  } else {
    // Generate once and immediately save so it's stable on every subsequent open
    currentSession = {
      key,
      dayLabel: `${day} — ${time} — WEEK ${currentWeek}`,
      title: title.toUpperCase(),
      energy,
      blocks: autoGenerateBlocks(energy, title),
      notes: ''
    };
    // Save immediately so it doesn't regenerate next time
    saveToStorage(key, currentSession);
  }

  updateSessionUI();
  showScreen('session');
}

// Auto-generate a session from the library based on energy focus
function autoGenerateBlocks(energy, title) {
  const blocks = [];
  const e = (energy || '').toLowerCase();
  const t = (title || '').toLowerCase();

  // Pick warm up — rotate through options based on energy
  const wus = LIBRARY.warmup;
  const wu = wus[Math.floor(Math.random() * Math.min(8, wus.length))];
  blocks.push({ ...wu, type: 'warmup' });

  // Pick main set based on energy system
  let mainCandidates = LIBRARY.main.filter(s => {
    const se = s.energy.toLowerCase();
    if (e.includes('sp-1') || e.includes('sp-2') || e.includes('sp-3') || t.includes('sprint') || t.includes('race') || t.includes('lactate')) {
      return se.includes('sp-');
    }
    if (e.includes('en-3') || e.includes('vo2')) {
      return se.includes('en-3') || se.includes('vo2');
    }
    if (e.includes('en-2') || t.includes('threshold')) {
      return se.includes('en-2');
    }
    if (e.includes('a2') || t.includes('aerobic')) {
      return se.includes('a2') || se.includes('en-2');
    }
    if (t.includes('recovery') || t.includes('skills') || t.includes('technical')) {
      return se.includes('a1') || se.includes('skills');
    }
    return true;
  });

  if (mainCandidates.length === 0) mainCandidates = LIBRARY.main;
  const main = mainCandidates[Math.floor(Math.random() * Math.min(5, mainCandidates.length))];
  blocks.push({ ...main, type: 'main' });

  // Pick a filler — kick or pull based on session type
  const fillerCandidates = LIBRARY.filler.filter(s => {
    const sn = s.name.toLowerCase();
    if (t.includes('fly')) return sn.includes('kick') || sn.includes('dolphin');
    if (t.includes('threshold') || t.includes('aerobic')) return sn.includes('pull') || sn.includes('kick');
    return sn.includes('kick') || sn.includes('pull') || sn.includes('ims');
  });
  if (fillerCandidates.length > 0) {
    const filler = fillerCandidates[Math.floor(Math.random() * Math.min(5, fillerCandidates.length))];
    blocks.push({ ...filler, type: 'filler' });
  }

  return blocks;
}

function updateSessionUI() {
  document.getElementById('sDayLabel').textContent = currentSession.dayLabel;
  document.getElementById('sTitle').textContent = currentSession.title;
  document.getElementById('sEnergy').textContent = currentSession.energy || '—';
  document.getElementById('sBlocks').textContent = currentSession.blocks.length;
  document.getElementById('sessionNotes').value = currentSession.notes || '';

  // Calculate total volume
  let totalVol = 0;
  currentSession.blocks.forEach(b => {
    const num = parseInt((b.volume || '').replace(/[^0-9]/g,''));
    if (!isNaN(num)) totalVol += num;
  });
  document.getElementById('sVol').textContent = totalVol > 0 ? totalVol.toLocaleString() + 'm' : '—';

  // Auto-save every change so it persists when navigating away
  if (currentSession.key) saveToStorage(currentSession.key, currentSession);

  renderBlocks();
}

function renderBlocks() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';

  if (currentSession.blocks.length === 0) {

    return;
  }

  currentSession.blocks.forEach((block, idx) => {
    const badgeClass = getBadgeClass(block.energy);
    const typeLabel = { warmup:'WARM UP', main:'MAIN SET', filler:'FILLER', skills:'SKILLS/DRILLS' }[block.type] || block.type.toUpperCase();

    const div = document.createElement('div');
    div.className = 'block-item';
    div.innerHTML = `
      <div class="block-header" onclick="showBlockDetail(${idx})" style="cursor:pointer;">

  });
}

function moveBlock(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= currentSession.blocks.length) return;
  const blocks = currentSession.blocks;
  [blocks[idx], blocks[newIdx]] = [blocks[newIdx], blocks[idx]];
  updateSessionUI();
}

function deleteBlock(idx) {
  currentSession.blocks.splice(idx, 1);
  updateSessionUI();
}

function swapBlock(idx) {
  swapTargetIndex = idx;
  const type = currentSession.blocks[idx].type;
  showSwapModal(type);
}

function saveSession() {
  currentSession.notes = document.getElementById('sessionNotes').value;
  saveToStorage(currentSession.key, currentSession);

  // Save full session detail to archive
  const archive = loadFromStorage('archive') || [];
  const existing = archive.findIndex(a => a.key === currentSession.key);
  const entry = {
    key: currentSession.key,
    dayLabel: currentSession.dayLabel,
    title: currentSession.title,
    energy: currentSession.energy,
    blockCount: currentSession.blocks.length,
    blockData: currentSession.blocks, // full block detail
    volume: document.getElementById('sVol').textContent,
    notes: currentSession.notes,
    savedAt: new Date().toISOString()
  };
  if (existing >= 0) archive[existing] = entry;
  else archive.unshift(entry);
  saveToStorage('archive', archive);

  // Visual feedback
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = 'SAVED ✓';
  btn.style.background = '#2a5a2a';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2000);
}

// ============================================================
// ADD BLOCK MODAL
// ============================================================
function showAddBlockModal() {
  addBlockSelectedType = 'warmup';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.type-btn')[0].classList.add('active');
  document.getElementById('addEnergyFilterRow').style.display = 'none';
  renderAddBlockList('warmup', 'all');
  document.getElementById('addBlockModal').classList.add('active');
}

function selectBlockType(type, btn) {
  addBlockSelectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show energy filter only for main sets
  const energyRow = document.getElementById('addEnergyFilterRow');
  if (type === 'main') {
    energyRow.style.display = 'flex';
    // Reset energy filter to 'all'
    energyRow.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    energyRow.querySelectorAll('.filter-chip')[0].classList.add('active');
  } else {
    energyRow.style.display = 'none';
  }
  renderAddBlockList(type, 'all');
}

// Shared energy filter for both modals
function filterModalEnergy(energy, btn, modalType) {
  const rowId = modalType === 'add' ? 'addEnergyFilterRow' : 'swapEnergyFilterRow';
  document.getElementById(rowId).querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (modalType === 'add') {
    renderAddBlockList(addBlockSelectedType, energy);
  } else {
    renderSwapList(currentSwapBlockType, energy);
  }
}

function renderAddBlockList(type, energyFilter) {
  energyFilter = energyFilter || 'all';
  const list = document.getElementById('addBlockList');
  list.innerHTML = '';
  let items = LIBRARY[type] || [];

  // Apply energy filter for main sets
  if (type === 'main' && energyFilter !== 'all') {
    items = items.filter(item => matchesEnergyFilter(item.energy, energyFilter));
  }

  if (items.length === 0) {
    list.innerHTML = `<div style="color:var(--silver);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:16px 0;text-align:center;">NO SETS FOR THIS ENERGY SYSTEM</div>`;
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'modal-item';
    div.innerHTML = `
      <div class="modal-item-name">${item.name}</div>
      <div class="modal-item-meta">
        <span class="badge ${getBadgeClass(item.energy)}">${item.energy}</span>
        <span class="lib-vol">${item.volume}</span>
        ${item.scalable ? '<span class="scalable-tag">Scalable</span>' : ''}
      </div>`;
    div.onclick = () => {
      currentSession.blocks.push({ ...item, type });
      updateSessionUI();
      closeModal('addBlockModal');
    };
    list.appendChild(div);
  });
}

// ============================================================
// SWAP MODAL
// ============================================================
let currentSwapBlockType = 'main';

function showSwapModal(type) {
  currentSwapBlockType = type;
  const filterRow = document.getElementById('swapEnergyFilterRow');
  if (type === 'main') {
    filterRow.style.display = 'flex';
    filterRow.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    filterRow.querySelectorAll('.filter-chip')[0].classList.add('active');
  } else {
    filterRow.style.display = 'none';
  }
  renderSwapList(type, 'all');
  document.getElementById('swapModal').classList.add('active');
}

function renderSwapList(type, energyFilter) {
  energyFilter = energyFilter || 'all';
  const list = document.getElementById('swapList');
  list.innerHTML = '';
  let items = LIBRARY[type] || [];

  if (type === 'main' && energyFilter !== 'all') {
    items = items.filter(item => matchesEnergyFilter(item.energy, energyFilter));
  }

  if (items.length === 0) {
    list.innerHTML = `<div style="color:var(--silver);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:16px 0;text-align:center;">NO SETS FOR THIS ENERGY SYSTEM</div>`;
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'modal-item';
    div.innerHTML = `
      <div class="modal-item-name">${item.name}</div>
      <div class="modal-item-meta">
        <span class="badge ${getBadgeClass(item.energy)}">${item.energy}</span>
        ${item.fly ? '<span class="badge badge-fly">FLY</span>' : ''}
        <span class="lib-vol">${item.volume}</span>
        ${item.scalable ? '<span class="scalable-tag">Scalable</span>' : ''}
      </div>`;
    div.onclick = () => {
      pendingSwapItem = item;
      pendingSwapType = type;
      showSwapPreview(item, type);
    };
    list.appendChild(div);
  });
}

function showSwapPreview(item, type) {
  const badgeClass = getBadgeClass(item.energy);
  const flyTag = item.fly ? '<span class="badge badge-fly">FLY</span>' : '';
  const linesHTML = buildDetailLinesHTML(item);
  const typeLabel = { warmup:'WARM UP', main:'MAIN SET', filler:'FILLER', skills:'SKILLS / DRILLS' }[type] || 'SET';

  document.getElementById('swapPreviewContent').innerHTML = `
    <div style="margin-bottom:12px;">
      <div class="block-detail-type">${typeLabel}</div>
      <div class="block-detail-title" style="font-size:26px;">${item.name}</div>
      <div class="block-detail-badges">
        <span class="badge ${badgeClass}">${item.energy}</span>
        ${flyTag}
        ${item.scalable ? '<span class="scalable-tag">Scalable</span>' : ''}
      </div>
    </div>
    <div class="block-detail-notes" style="max-height:50vh;overflow-y:auto;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--silver);margin-bottom:10px;">SET DETAILS</div>
      ${linesHTML}
      <div class="block-detail-vol">Total: ${item.volume}</div>
    </div>`;

  closeModal('swapModal');
  document.getElementById('swapPreviewModal').classList.add('active');
}

function confirmSwap() {
  if (pendingSwapItem && swapTargetIndex >= 0) {
    currentSession.blocks[swapTargetIndex] = { ...pendingSwapItem, type: pendingSwapType };
    swapTargetIndex = -1;
    pendingSwapItem = null;
    pendingSwapType = null;
    updateSessionUI();
  }
  closeModal('swapPreviewModal');
}

function matchesEnergyFilter(energy, filter) {
  const e = energy.toLowerCase();
  if (filter === 'a1') return e.includes('a1') || e.includes('a2') || e === 'skills';
  if (filter === 'en2') return e.includes('en-2');
  if (filter === 'en3') return e.includes('en-3') || e.includes('vo2');
  if (filter === 'sp1') return e.includes('sp-1');
  if (filter === 'sp2') return e.includes('sp-2') || e.includes('sp-3');
  return true;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// ============================================================
// AI SESSION GENERATOR

// ============================================================
// LIBRARY SCREEN
// ============================================================
let currentLibType = 'all';
let currentEnergyFilter = 'all';

function renderLibrary(typeFilter, energyFilter) {
  typeFilter = typeFilter || currentLibType;
  energyFilter = energyFilter || currentEnergyFilter;
  currentLibType = typeFilter;
  currentEnergyFilter = energyFilter;

  const content = document.getElementById('libContent');
  content.innerHTML = '';

  const sectionMap = { warmup:'WARM UPS', main:'MAIN SETS', filler:'FILLERS', skills:'SKILLS & DRILLS' };
  const keys = typeFilter === 'all' ? ['warmup','main','filler','skills'] : [typeFilter];

  keys.forEach(key => {
    let items = LIBRARY[key] || [];

    // Apply energy filter
    if (energyFilter !== 'all') {
      items = items.filter(item => {
        const e = item.energy.toLowerCase();
        if (energyFilter === 'fly') return !!item.fly;
        if (energyFilter === 'a1') return e.includes('a1') || e.includes('a2') || e === 'skills' || e === 'recovery';
        if (energyFilter === 'en2') return e.includes('en-2');
        if (energyFilter === 'en3') return e.includes('en-3') || e.includes('vo2');
        if (energyFilter === 'sp1') return e.includes('sp-1');
        if (energyFilter === 'sp2') return e.includes('sp-2') || e.includes('sp-3');
        return true;
      });
    }

    if (items.length === 0) return;

    content.innerHTML += `<div class="lib-section-title">${sectionMap[key]} <span class="lib-count">${items.length}</span></div>`;

    // Group main sets by energy system
    if (key === 'main' && typeFilter === 'main' && energyFilter === 'all') {
      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.energy]) grouped[item.energy] = [];
        grouped[item.energy].push(item);
      });
      const energyOrder = ['A1','A1/A2','A1/Skills','A2','A2/EN-2','EN-2','EN-2/EN-3','EN-3/VO2','SP-1','SP-1/SP-2','SP-2/SP-3'];
      Object.keys(grouped).sort((a,b) => {
        const ai = energyOrder.findIndex(e => a.startsWith(e.split('/')[0]));
        const bi = energyOrder.findIndex(e => b.startsWith(e.split('/')[0]));
        return (ai===-1?99:ai)-(bi===-1?99:bi);
      }).forEach(eKey => {
        content.innerHTML += `<div style="margin:10px 0 6px;"><span class="badge ${getBadgeClass(eKey)}">${eKey}</span></div>`;
        grouped[eKey].forEach(item => {
          content.innerHTML += renderLibItem(item);
        });
      });
      return;
    }

    items.forEach(item => {
      content.innerHTML += renderLibItem(item);
    });
  });
}

function renderLibItem(item) {
  const flyTag = item.fly ? '<span class="badge badge-fly">FLY</span>' : '';
  return `<div class="lib-item" onclick="showLibItemDetail(${JSON.stringify(item).replace(/"/g,'&quot;')})">
    <div class="lib-item-name">${item.name}</div>
    <div class="lib-item-meta">
      <span class="badge ${getBadgeClass(item.energy)}">${item.energy}</span>
      ${flyTag}
      <span class="lib-vol">${item.volume}</span>
      ${item.scalable ? '<span class="scalable-tag">Scalable</span>' : ''}
    </div>
    <div class="lib-notes">${item.notes}</div>
  </div>`;
}

function filterLib(type, btn) {
  document.getElementById('typeFilterRow').querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLibrary(type, currentEnergyFilter);
}

function filterEnergy(energy, btn) {
  document.getElementById('energyFilterRow').querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentEnergyFilter = energy;
  renderLibrary(currentLibType, energy);
}

// ============================================================
// ARCHIVE SCREEN
// ============================================================
function renderArchive() {
  const content = document.getElementById('archiveContent');
  const archive = loadFromStorage('archive') || [];

  if (archive.length === 0) {
    content.innerHTML = `<div style="color:var(--silver);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:20px 0;text-align:center;">NO SESSIONS SAVED YET<br><br>Complete a session and hit SAVE to start your coaching log.</div>`;
    return;
  }

  content.innerHTML = archive.map((entry, idx) => {
    const typeLabel = { warmup:'WARM UP', main:'MAIN SET', filler:'FILLER', skills:'SKILLS/DRILLS' };
    const savedDate = new Date(entry.savedAt).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

    const blocksHTML = (entry.blockData || []).map(block => {
      const tl = typeLabel[block.type] || block.type.toUpperCase();
      const badgeClass = getBadgeClass(block.energy);
      return `<div style="background:var(--black);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--silver);margin-bottom:3px;">${tl}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">${block.name}</span>
          <span class="badge ${badgeClass}">${block.energy}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--silver);">${block.volume}</span>
        </div>
        ${(block.set || []).slice(0,4).map(line =>
          line.startsWith('##') ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--silver);letter-spacing:1px;">${line.replace('##','').trim()}</div>`
          : line.startsWith('---') ? ''
          : `<div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--silver2);">${line}</div>`
        ).join('')}
        ${(block.set||[]).length > 4 ? `<div style="font-size:11px;color:var(--silver);font-family:'Barlow Condensed',sans-serif;">+ ${(block.set||[]).length - 4} more lines...</div>` : ''}
      </div>`;
    }).join('');

    const notesHTML = entry.notes ? `
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-top:8px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--silver);margin-bottom:6px;">COACH NOTES</div>
        <div style="font-size:14px;color:var(--white);line-height:1.5;">${entry.notes}</div>
      </div>` : '';

    return `
    <div class="archive-item" style="cursor:default;padding:0;overflow:hidden;">
      <div onclick="toggleArchive(${idx})" style="padding:12px 14px;cursor:pointer;">
        <div class="archive-date">${entry.dayLabel} <span style="color:var(--border2);font-size:10px;">· Saved ${savedDate}</span></div>
        <div class="archive-title">${entry.title}</div>
        <div class="archive-meta" style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${entry.energy ? `<span class="badge ${getBadgeClass(entry.energy)}">${entry.energy}</span>` : ''}
          <span>${entry.volume}</span>
          <span>${entry.blockCount || (entry.blockData||[]).length} blocks</span>
          ${entry.notes ? '<span style="color:var(--badge-en2t);">Notes ✓</span>' : ''}
          <span style="margin-left:auto;color:var(--silver);font-size:14px;" id="archive-chevron-${idx}">›</span>
        </div>
      </div>
      <div id="archive-detail-${idx}" style="display:none;padding:0 14px 14px;">
        <div style="height:1px;background:var(--border);margin-bottom:12px;"></div>
        ${blocksHTML}
        ${notesHTML}
      </div>
    </div>`;
  }).join('');
}

function toggleArchive(idx) {
  const detail = document.getElementById(`archive-detail-${idx}`);
  const chevron = document.getElementById(`archive-chevron-${idx}`);
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  chevron.textContent = isOpen ? '›' : '⌄';
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function saveToStorage(key, data) {
  try { localStorage.setItem('ssa_' + key, JSON.stringify(data)); } catch(e) {}
}

function loadFromStorage(key) {
  try {
    const d = localStorage.getItem('ssa_' + key);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

// ============================================================
// HELPERS
// ============================================================
function getBadgeClass(energy) {
  if (!energy) return 'badge-rec';
  const e = energy.toLowerCase();
  if (e.includes('sp-1')) return 'badge-sp1';
  if (e.includes('sp-2') || e.includes('sp-3')) return 'badge-sp2';
  if (e.includes('en-3') || e.includes('vo2')) return 'badge-en3';
  if (e.includes('en-2')) return 'badge-en2';
  if (e.includes('recovery')) return 'badge-rec';
  return 'badge-a1';
}

// INIT

document.getElementById('headerDate').textContent =
  now.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }).toUpperCase();

const msPerWeek = 7 * 24 * 60 * 60 * 1000;
const weeksSinceStart = Math.floor((now - PLAN_START) / msPerWeek);
currentWeek = Math.max(1, weeksSinceStart + 1);

renderWeek();
renderLibrary('all', 'all');
</script>
